<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuzion Pilot — Paiement annulé</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background:
                radial-gradient(circle at 50% 0%, rgba(249,115,22,0.18) 0%, transparent 55%),
                var(--bg-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }
        .cancel-card {
            max-width: 520px;
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .cancel-icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: rgba(249,115,22,0.15);
            border: 1px solid rgba(249,115,22,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--orange);
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.75rem; }
        .lead { color: var(--text-secondary); font-size: 1rem; margin-bottom: 2rem; line-height: 1.6; }
        .actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            transition: transform .15s, box-shadow .2s, background .2s;
        }
        .btn-primary { background: var(--gradient-main); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 30px rgba(124,58,237,0.35); }
        .btn-outline { border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-card-hover); }
    </style>
</head>
<body>
    <div class="cancel-card">
        <div class="cancel-icon"><i class="fas fa-circle-exclamation"></i></div>
        <h1>Paiement annulé</h1>
        <p class="lead">
            Aucun prélèvement n'a été effectué. Vous pouvez reprendre votre inscription
            quand vous le souhaitez ou nous contacter si vous avez des questions.
        </p>
        <div class="actions">
            <a href="pricing.html" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i> Retour aux tarifs
            </a>
            <a href="index.html" class="btn btn-outline">
                <i class="fas fa-house"></i> Accueil
            </a>
        </div>
    </div>
</body>
</html>
